<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindPet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#6dd5ed,#2193b0);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.main{
background:white;
padding:50px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:500px;
width:90%;
}

.logo{
width:120px;
margin-bottom:20px;
}

.titulo{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
color:#333;
}

.descripcion{
color:#666;
margin-bottom:30px;
}

.boton{
background:#2193b0;
border:none;
padding:12px 25px;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.boton:hover{
background:#176e84;
}

</style>

</head>

<body>

<div class="main">

<img src="images/Logo.png" class="logo">

<h1 class="titulo">Bienvenido a MindPet</h1>

<p class="descripcion">
Una plataforma para apoyar la salud mental y el bienestar emocional.
</p>

<button class="boton" onclick="window.location.href='html/register.html'">
Crear cuenta
</button>

</div>

</body>
</html>
