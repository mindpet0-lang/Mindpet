<div class="forum-wrapper">
  <nav class="mindpet-nav">
    <span class="logo">MindPet 🐾</span>
    <button *ngIf="!isLoggedIn()" (click)="login()" class="btn-login">Entrar</button>
    <span *ngIf="isLoggedIn()" class="user-badge">Hola, {{ currentUser() }}</span>
  </nav>

  <div class="content-container">
    <div class="post-box card" *ngIf="isLoggedIn()">
      <textarea [(ngModel)]="newPostContent" placeholder="¿Cómo te sientes hoy?"></textarea>
      <div class="actions">
        <input type="file" (change)="onFileSelected($event)" id="img-input" hidden #fileInput>
        <button class="btn-outline ml-3" (click)="fileInput.click()" style="border: none; background-color: white;">📸 Añadir Foto</button>
        <button class="btn-publish" (click)="publishPost()">Publicar</button>
      </div>
      <img *ngIf="selectedImage" [src]="selectedImage" class="preview-img">
    </div>

    <div class="feed">
      <div *ngFor="let post of posts()" class="post-card card">
        <div class="post-header">
          <div class="avatar"></div>
          <strong>{{ post.author }}</strong>
        </div>
        <p class="post-body">{{ post.content }}</p>
        <img *ngIf="post.image" [src]="post.image" class="post-image">
        
        <div class="post-footer">
          <button (click)="toggleLike(post.id)" style="border: none;" [class.liked]="post.likes.includes(currentUser() || '')">
            ❤ {{ post.likes.length }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
