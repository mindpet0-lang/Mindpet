<div class="forum-wrapper">

  <!-- NAV11 -->
  <nav class="mindpet-nav">
    <span class="logo">🐾 MindPet</span>

    <button *ngIf="!isLoggedIn()" (click)="login()" class="btn-login" routerLink="/login">
      Entrar
    </button>

    <span *ngIf="isLoggedIn()" class="user-badge">
      Hola, {{ currentUser() }}
    </span>

    <div class="profile-header">
  <div class="account-container" (click)="onProfileClick()">
    <span class="material-icons">account_circle</span>
  </div>

  <div class="user-menu" *ngIf="isMenuOpen && user">
    <div class="user-info">
      <p class="user-name">{{ user.nombre }}</p>
      <p class="user-email">{{ user.correo }}</p>
    </div>
    <hr>
    <button class="btn-logout" (click)="onLogout()">
      <span class="material-icons">logout</span>
      Cerrar sesión
    </button>
  </div>
</div>
      
  </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="content-container">

    <!-- CREAR POST -->
    <div class="post-box card" *ngIf="isLoggedIn()">
      <textarea 
        [(ngModel)]="newPostContent" 
        placeholder="¿Cómo te sientes hoy?" 
        class="textarea">
      </textarea>

      <div class="actions">
        <input type="file" (change)="onFileSelected($event)" hidden #fileInput>

        <button class="btn-outline btn btn-dark"  (click)="fileInput.click()">
          📸 Añadir Foto
        </button>

        <button (click)="publishPost()" class="btn-publish">
          Publicar
        </button>
      </div>

      <img *ngIf="selectedImage" [src]="selectedImage" class="preview-img">
    </div>

    <!-- FEED -->
    <div class="feed">

      <div *ngFor="let post of posts()" class="post-card card">

        <!-- HEADER -->
        <div class="post-header">
          <div class="avatar">👤</div>
          <strong>{{ post.author || 'Usuario' }}</strong>
        </div>

        <!-- CONTENIDO NORMAL -->
        <p *ngIf="editandoPostId !== post.id" class="post-body">
          {{ post.content || 'Sin contenido' }}
        </p>

        <!-- MODO EDICIÓN -->
        <div *ngIf="editandoPostId === post.id">
          <textarea [(ngModel)]="editContent"></textarea>

          <button (click)="guardarEdicion(post)">💾 Guardar</button>
          <button (click)="editandoPostId = null">❌ Cancelar</button>
        </div>

        <!-- IMAGEN -->
        <img *ngIf="post.image" [src]="post.image" class="post-image">

        <!-- FOOTER -->
        <div class="post-footer">

          <!-- ❤️ LIKE -->
          <button 
            (click)="toggleLike(post.id)" 
            class="like-btn"
            [class.liked]="post.likes.includes(currentUser()!)">

            ❤️ {{ post.likes.length || 0 }}
          </button>

          <!-- ✏️🗑️ SOLO SI ES TU POST -->
          <div *ngIf="post.author === currentUser()" class="owner-actions">

            <button (click)="editarPost(post)">✏️</button>

            <button (click)="eliminarPost(post.id)">🗑️</button>

          </div>

        </div>

      </div>

    </div>

  </div>
</div>
