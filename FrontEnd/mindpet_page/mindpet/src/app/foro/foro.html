<div class="foro-container">

    <!-- CREAR POST -->
    <div class="crear-post">

        <h3>Comparte con la comunidad</h3>

        <form [formGroup]="postForm" (ngSubmit)="crearPost()">

            <textarea 
            formControlName="contenido"
            placeholder="¿Cómo te sientes hoy?"></textarea>

            <button type="submit" [disabled]="postForm.invalid">
                Publicar
            </button>

        </form>

    </div>


    <!-- LISTA POSTS -->

    <div class="post" *ngFor="let post of posts">

        <div class="post-header">

            <div class="avatar"></div>

            <div>
                <span class="usuario">{{post.usuario}}</span>
                <span class="fecha">{{post.fecha}}</span>
            </div>

        </div>


        <p class="contenido">
            {{post.contenido}}
        </p>


        <!-- ACCIONES -->

        <div class="acciones">

            <button (click)="darLike(post)">
                ❤️ {{post.likes}}
            </button>

        </div>


        <!-- COMENTARIOS -->

        <div class="comentarios">

            <div class="comentario"
            *ngFor="let comentario of post.comentarios">

                <span class="comentario-user">
                    {{comentario.usuario}}
                </span>

                {{comentario.texto}}

            </div>


            <div class="nuevo-comentario">

                <input
                [(ngModel)]="post.nuevoComentario"
                placeholder="Escribe un comentario...">

                <button (click)="agregarComentario(post)">
                    Enviar
                </button>

            </div>

        </div>

    </div>

</div>
