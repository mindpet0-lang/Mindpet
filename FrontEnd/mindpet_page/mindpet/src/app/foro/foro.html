<div class="forum-wrapper">
  
  <nav class="mindpet-nav">
    <span class="logo" routerLink="/home" style="cursor:pointer">🐾 MindPet</span>

    <div class="nav-right" style="display: flex; align-items: center; gap: 15px;">
      
      <button *ngIf="!isLoggedIn()" (click)="login()" class="btn-publish" routerLink="/login">
        Entrar
      </button>

      <ng-container *ngIf="isLoggedIn()">
        <span class="user-badge" style="color: #000;">
          Hola, {{ currentUser() }}
        </span>

        <div class="profile-header">
          <div class="account-container" (click)="onProfileClick()" style="cursor: pointer; display: flex;">
            <span class="material-icons" style="font-size: 32px; color: #000;">account_circle</span>
          </div>

          <div class="user-menu" *ngIf="isMenuOpen && user">
            <div class="user-info">
              <p style="font-weight: bold; color: #333; font-size: 1rem;">{{ user.nombre }}</p>
              <p style="font-size: 0.85rem; color: #666;">{{ user.correo }}</p>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 12px 0;">
            
            <button class="btn-logout" (click)="onLogout()">
              <span class="material-icons" style="font-size: 18px;">logout</span>
              Cerrar sesión
            </button>
          </div>
        </div>
      </ng-container>
    </div>
  </nav>

  <div class="content-container">

    <div class="post-box card" *ngIf="isLoggedIn()">
      <textarea [(ngModel)]="newPostContent" placeholder="¿Cómo te sientes hoy?" class="textarea" rows="3"></textarea>

      <div class="actions" style="display: flex; justify-content: flex-end; margin-top: 10px;">
        <button (click)="publishPost()" class="btn-publish">
          Publicar
        </button>
      </div>
    </div>

    <div class="feed">
      <div *ngFor="let post of posts()" class="post-card card">
        
        <div class="post-header" style="display: flex; align-items: center; gap: 10px;">
          <div style="background: #3f6d8c; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            👤
          </div>
          <strong style="color: #000;">{{ post.author || 'Usuario' }}</strong>
        </div>

        <div style="margin-top: 15px;">
          <p *ngIf="editandoPostId !== post.id" class="post-body" style="color: #000;">
            {{ post.content }}
          </p>

          <div *ngIf="editandoPostId === post.id" style="display: flex; flex-direction: column; gap: 10px;">
            <textarea [(ngModel)]="editContent" class="textarea" style="background: #fff; border: 1px solid #ddd;"></textarea>
            <div style="display: flex; gap: 10px;">
              <button (click)="guardarEdicion(post)" class="btn-publish" style="padding: 6px 12px; font-size: 13px;">Guardar</button>
              <button (click)="editandoPostId = null" style="background: #eee; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 13px;">Cancelar</button>
            </div>
          </div>
        </div>

        <img *ngIf="post.image" [src]="post.image" class="post-image">

        <div class="post-footer" style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
          <button (click)="toggleLike(post.id)" class="like-btn" [class.liked]="post.likes.includes(currentUser()!)">
            ❤️ {{ post.likes.length || 0 }}
          </button>

          <div *ngIf="currentUser() === post.author" style="display: flex; gap: 8px;">
            <button (click)="editarPost(post)" style="background: rgba(0,0,0,0.05); border: none; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-size: 12px;">✏️ Editar</button>
            <button (click)="eliminarPost(post.id)" style="background: rgba(0,0,0,0.05); border: none; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-size: 12px;">🗑 Eliminar</button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
