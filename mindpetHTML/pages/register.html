<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - MindPet</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="register.css">

</head>

<body>

<div class="container-fluid bg-mindpet">


<div class="main-wrapper">

    <img src="../images/Logo.png" class="imgLogo">

    <h2 class="titulo-registro">Únete a MindPet</h2>

    <div class="formulario-registro">


    <form id="formRegistro">

        <div class="row-inputs">
            <input type="text" placeholder="Nombre" class="input-mindpet" id="nombre">
            <input type="text" placeholder="Apellido" class="input-mindpet" id="apellido">
        </div>

        <input type="tel" placeholder="Teléfono" class="input-mindpet" id="telefono">

        <input type="email" placeholder="Correo electrónico" class="input-mindpet" id="correo">

        <input type="password" placeholder="Contraseña" class="input-mindpet" id="password">

        <div class="botones-container">

        <button class="boton" type="submit">
            Crear mi cuenta
        </button>

        <button class="boton boton-secundario"
            onclick="window.location.href='../welcome.html'" type="button">
            Volver
        </button>

        </div>

    </form>
   

    </div>

</div>


</div>


<script src="register.js"></script>

</body>
</html>
